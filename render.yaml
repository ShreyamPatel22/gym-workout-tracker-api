services:
  - type: web
    name: gym-workout-tracker-api
    runtime: node
    buildCommand: npm install && npx prisma migrate deploy
    startCommand: npx prisma generate && npm run seed && node src/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
